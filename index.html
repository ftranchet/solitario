<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e3a22">
<link rel="icon" href="favicon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="description" content="Suite de juegos clásicos (Solitario, Carta Blanca, Corazones y Buscaminas) para jugar en el navegador, también sin conexión.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Juegos clásicos">
<title>Juegos clásicos</title>
<script>
  if ("serviceWorker" in navigator) {
    addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<style>
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    min-height: 100vh; min-height: 100dvh;
  }

  #launcher {
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; padding: calc(28px + env(safe-area-inset-top, 0px)) 18px calc(28px + env(safe-area-inset-bottom, 0px));
  }

  .hero { text-align: center; }
  .big-title { font-weight: 800; font-size: 30px; letter-spacing: 0.5px; margin: 0; }
  .sub { margin: 6px 0 0; font-size: 14px; opacity: 0.85; }

  .tiles {
    width: 100%; max-width: 620px;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  }
  .tile {
    display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px;
    padding: 22px 14px;
    background: linear-gradient(160deg, #ffffff, #f4eede);
    border: 1px solid #d9cdb4; border-radius: 18px;
    color: #2a2a26; text-decoration: none;
    box-shadow: 0 6px 16px rgba(0,0,0,0.28);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .tile:hover, .tile:focus {
    transform: translateY(-3px);
    box-shadow: 0 10px 22px rgba(0,0,0,0.34), 0 0 0 3px rgba(232,180,74,0.7);
    outline: none;
  }
  .tile:active { transform: scale(0.97); }
  .tile .ico { font-size: 46px; line-height: 1; height: 1em; display: flex; align-items: center; }
  .tile .ico svg { display: block; }
  .tile .tname { font-weight: 800; font-size: 17px; }

  .stats-link {
    align-self: center; display: inline-flex; align-items: center; gap: 8px;
    color: #fff; text-decoration: none; font-weight: 600; font-size: 14px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22);
    padding: 9px 16px; border-radius: 999px;
  }
  .stats-link:active { transform: scale(0.97); }

  .credit-foot { font-size: 12px; opacity: 0.85; text-align: center; margin: 0; }
  .credit-foot .author { color: inherit; font-weight: 700; text-decoration: none; }
  .credit-foot .author:hover, .credit-foot .author:focus { text-decoration: underline; }

  @media (min-width: 720px) {
    .big-title { font-size: 38px; }
    .sub { font-size: 16px; }
    .tiles { grid-template-columns: repeat(4, 1fr); max-width: 860px; }
    .tile .ico { font-size: 52px; }
    .tile .tname { font-size: 18px; }
  }
</style>
</head>
<body>
<main id="launcher">
  <div class="hero">
    <h1 class="big-title">🎮 Juegos clásicos</h1>
    <p class="sub">Elegí un juego para empezar</p>
  </div>

  <nav class="tiles">
    <a class="tile" href="solitario.html">
      <span class="ico">🃏</span>
      <span class="tname">Solitario</span>
    </a>
    <a class="tile" href="carta-blanca.html">
      <span class="ico"><svg viewBox="0 0 32 32" width="1em" height="1em" aria-hidden="true"><rect x="9" y="6" width="17" height="23" rx="3" fill="rgba(0,0,0,0.13)"/><rect x="6" y="3.5" width="18" height="24" rx="3" fill="#fff" stroke="#c9a44a" stroke-width="1.4"/><text x="15" y="21" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="bold" font-size="16" fill="#1a1a1a">&#9824;</text></svg></span>
      <span class="tname">Carta Blanca</span>
    </a>
    <a class="tile" href="corazones.html">
      <span class="ico">❤️</span>
      <span class="tname">Corazones</span>
    </a>
    <a class="tile" href="buscaminas.html">
      <span class="ico">💣</span>
      <span class="tname">Buscaminas</span>
    </a>
  </nav>

  <a class="stats-link" href="estadisticas.html">📊 Estadísticas</a>

  <p class="credit-foot">Por <a class="author" href="https://www.linkedin.com/in/ftranchet/" target="_blank" rel="noopener noreferrer">Francisco Tranchet</a> + IA</p>
</main>
</body>
</html>
