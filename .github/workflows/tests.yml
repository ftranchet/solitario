name: Tests

# Corre la suite de tests de navegador en cada push a main y en cada Pull Request.
# También se puede lanzar a mano desde la pestaña "Actions" del repo.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Instala/encuentra Chromium dentro del workspace (lo resuelve tests/run.js).
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4
        with:
          # Historia completa: la guardia del SW compara contra la rama base / commit anterior.
          fetch-depth: 0

      - name: Guardia de la caché offline (VERSION de sw.js)
        run: bash tests/check-sw-version.sh

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      # npm ci usa el package-lock.json commiteado: mismas versiones en cada corrida
      - name: Instalar dependencias
        working-directory: tests
        run: npm ci

      - name: Instalar Chromium (con dependencias del sistema)
        working-directory: tests
        run: npx --yes playwright@1.61.1 install --with-deps chromium

      - name: Correr los tests
        working-directory: tests
        run: npm test

      # Regresión visual: recaptura las 40 pantallas (breakpoints + estados
      # intermedios + modo oscuro) con reparto determinista (semilla fija en
      # screenshot.js) y compara pixel a pixel contra docs/screenshots/. Un
      # cambio visual intencional se resuelve regenerando la referencia
      # (node screenshot.js) y commiteándola.
      - name: Regresión visual (capturas deterministas vs. baseline)
        working-directory: tests
        run: node visual.js

      # Chequeo de tipos (// @ts-check + JSDoc) de los módulos compartidos
      # (shared/*.js, games/registry.js). No cubre los <script> inline de cada
      # juego (ver docs/ARQUITECTURA.md, Fase 5).
      - name: Chequear tipos (shared/*.js, games/registry.js)
        run: npx --yes typescript@5 tsc -p .

  # Humo en WebKit (el motor de Safari): las 6 páginas cargan sin errores y
  # con los metadatos PWA. La suite completa corre en Chromium (arriba); esto
  # cubre el hueco de compatibilidad más probable (dvh, container queries,
  # safe-areas) sin duplicar toda la suite.
  test-webkit:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Instalar dependencias
        working-directory: tests
        run: npm ci

      - name: Instalar WebKit (con dependencias del sistema)
        working-directory: tests
        run: npx --yes playwright@1.61.1 install --with-deps webkit

      - name: Humo en WebKit
        working-directory: tests
        run: PW_BROWSER=webkit npm test -- --smoke

  # Humo en Firefox (decisión D3, docs/PLAN-2.md): RNF-07 del PRD promete
  # compatibilidad con Firefox pero CI no lo verificaba (sólo Chromium
  # completo + WebKit de humo). Mismo alcance mínimo que el job de WebKit:
  # las 6 páginas cargan sin errores y con los metadatos PWA.
  test-firefox:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Instalar dependencias
        working-directory: tests
        run: npm ci

      - name: Instalar Firefox (con dependencias del sistema)
        working-directory: tests
        run: npx --yes playwright@1.61.1 install --with-deps firefox

      - name: Humo en Firefox
        working-directory: tests
        run: PW_BROWSER=firefox npm test -- --smoke
